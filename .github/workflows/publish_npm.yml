# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish package

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v6
        name: Checkout
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v6
        name: Setup Node.js
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - uses: pnpm/action-setup@v5
        name: Setup pnpm
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate JSON schemas and build library
        run: pnpm run generate && pnpm run build:lib

      - name: Publish to npm
        run: |
          pnpm publish --no-git-checks --tag ${{ github.event.release.prerelease && 'next' || 'latest' }}

      - name: Publish to JSR
        run: pnpx jsr publish --allow-slow-types --allow-dirty
